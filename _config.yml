title: nilgil's Wiki
description: daily updated wiki
theme: just-the-docs
url: https://wiki.nilgil.com
logo: "/assets/images/character.png"
favicon_ico: "/assets/images/favicon.ico"
color_scheme: dark

plugins:
  - jekyll-default-layout
  - jekyll-sitemap
  - jekyll-last-modified-at
  - jekyll-seo-tag
  - jekyll-include-cache

back_to_top: true
back_to_top_text: "Back to top"
permalink: pretty
toc_levels: 0

nav_external_links:
  - title: GitHub
    url: https://github.com/nilgil
    opens_in_new_tab: true
  - title: Blog
    url: https://nilgil.tistory.com
    opens_in_new_tab: true

search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

mermaid:
  version: "9.1.6"

callouts_level: quiet # or loud
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

defaults:
  -
    scope:
      path: ""
    values:
      has_toc: false